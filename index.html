<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minecraft World Map</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
<h1>Minecraft World Map</h1>
<div id="controls">
    <div class="control-group">
        <div class="control-title">Type Filters</div>
        <div class="control-actions">
            <button id="selectAll" type="button">Select all</button>
            <button id="selectNone" type="button">Select none</button>
        </div>
        <div id="typeFilters"></div>
    </div>
    <div class="control-group">
        <div class="control-title">Overlays</div>
        <label class="toggle">
            <input id="showGrid" type="checkbox" />
            <span>Show grid</span>
        </label>
        <label class="toggle">
            <input id="showAxes" type="checkbox" />
            <span>Show axes</span>
        </label>
        <label class="toggle">
            <input id="showScaleBar" type="checkbox" />
            <span>Show scale bar</span>
        </label>
    </div>
    <div class="control-group">
        <label class="toggle">
            <input id="invertZ" type="checkbox" />
            <span>Invert Z axis</span>
        </label>
    </div>
    <div class="control-group">
        <div class="control-title">Account</div>
        <span id="authStatus" class="auth-status"></span>
        <button id="loginBtn" type="button">Login</button>
        <button id="logoutBtn" type="button" class="hidden">Logout</button>
    </div>
    <div class="control-group hidden" id="editingGroup">
        <div class="control-title">Editing</div>
        <button id="editModeBtn" type="button">Edit Mode</button>
        <button id="addPointBtn" type="button">Add Point</button>
        <button id="importJsonBtn" type="button">Import JSON</button>
        <input type="file" id="importFileInput" accept=".json" style="display:none" />
    </div>
</div>
<div id="status"></div>
<div id="map-area">
    <div class="control-group" id="placesListGroup">
        <div class="control-title">Places</div>
        <input type="search" id="placesSearch" placeholder="Filter…" autocomplete="off" />
        <ul id="placesList"></ul>
    </div>
    <canvas id="map" width="900" height="650"></canvas>
</div>

<div id="loginOverlay" class="modal-overlay hidden">
    <div class="modal">
        <h2>Login</h2>
        <form id="loginForm" autocomplete="on">
            <label>Email<input id="login-email" type="email" required autocomplete="email" /></label>
            <label>Password<input id="login-password" type="password" required autocomplete="current-password" /></label>
            <div id="login-error" class="form-error hidden"></div>
            <div class="form-actions">
                <button type="submit" id="login-submit">Login</button>
                <button type="button" id="login-cancel">Cancel</button>
            </div>
        </form>
    </div>
</div>

<div id="pointFormOverlay" class="modal-overlay hidden">
    <div class="modal">
        <h2 id="pointFormTitle">Add Point</h2>
        <form id="pointForm" autocomplete="off">
            <label>Name<input id="pf-name" type="text" required /></label>
            <label>Type
                <input id="pf-type" type="text" list="pf-type-list" />
                <datalist id="pf-type-list"></datalist>
            </label>
            <label>X<input id="pf-x" type="number" /></label>
            <label>Z<input id="pf-z" type="number" /></label>
            <label>Y<input id="pf-y" type="number" /></label>
            <label>Notes<textarea id="pf-notes" rows="3"></textarea></label>
            <div id="pf-error" class="form-error hidden"></div>
            <div class="form-actions">
                <button type="submit" id="pf-save">Save</button>
                <button type="button" id="pf-delete" class="btn-danger hidden">Delete</button>
                <button type="button" id="pf-cancel">Cancel</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>

</html>
